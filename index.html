<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ココドコ？</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="shortcut icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- タイトル画面 -->
  <div id="screen-title" class="screen active">
    <div class="title-content">
      <div class="title-deco">🌍</div>
      <h1 class="title-logo">ココドコ？</h1>
      <p class="title-sub">ストリートビューを見て<br>場所を地図で当てよう！</p>
      <button id="btn-to-name" class="btn btn-primary">あそぶ！</button>
      <button id="btn-view-ranking" class="btn btn-secondary" style="margin-top:12px">🏆 ランキングを見る</button>
    </div>
  </div>

  <!-- ランダムネーム確認画面 -->
  <div id="screen-login" class="screen">
    <div class="card-screen">
      <div class="card-icon">🎲</div>
      <h2 class="card-title">あなたのランダムネーム</h2>
      <p class="card-sub">この名前は自動で決まります<br><small style="opacity:0.7">本名は入力しません</small></p>
      <div class="handle-display" id="handle-display">赤いパンダ</div>
      <div style="display:flex;flex-direction:column;gap:10px;width:100%">
        <button id="btn-handle-ok" class="btn btn-primary">この名前で始める →</button>
        <button id="btn-handle-reset" class="btn btn-secondary">🎲 別の名前にする</button>
        <button id="btn-handle-back" class="btn btn-secondary">タイトルに戻る</button>
      </div>
    </div>
  </div>

  <!-- モード選択画面 -->
  <div id="screen-mode" class="screen">
    <div class="card-screen">
      <div class="card-icon">🗾</div>
      <h2 class="card-title">モードをえらんでね</h2>
      <div class="mode-buttons">
        <button class="mode-card" id="mode-japan">
          <span class="mode-icon">🗾</span>
          <span class="mode-label">全国モード</span>
          <span class="mode-desc">日本のどこかから出題！</span>
        </button>
        <button class="mode-card" id="mode-local">
          <span class="mode-icon">📍</span>
          <span class="mode-label">地元モード（大阪市港区）</span>
          <span class="mode-desc">大阪市港区（築港〜弁天町）内から出題します</span>
        </button>
      </div>
      <button class="mode-card mode-card--world" id="mode-world">
        <span class="mode-icon">🌍</span>
        <span class="mode-label">世界チャレンジ</span>
        <span class="mode-desc">地理が得意な人向け！世界中から出題！</span>
      </button>
      <!-- 地元モード時の都道府県選択 -->
      <div id="pref-selector" class="pref-selector hidden">
        <select id="pref-select" class="pref-select">
          <option value="">エリアを選んでください</option>
          <optgroup label="⭐ カスタムエリア">
            <option value="chikko">築港エリア（大阪港〜弁天町）</option>
          </optgroup>
          <optgroup label="都道府県">
            <option value="hokkaido">北海道</option>
            <option value="aomori">青森県</option>
            <option value="iwate">岩手県</option>
            <option value="miyagi">宮城県</option>
            <option value="akita">秋田県</option>
            <option value="yamagata">山形県</option>
            <option value="fukushima">福島県</option>
            <option value="ibaraki">茨城県</option>
            <option value="tochigi">栃木県</option>
            <option value="gunma">群馬県</option>
            <option value="saitama">埼玉県</option>
            <option value="chiba">千葉県</option>
            <option value="tokyo">東京都</option>
            <option value="kanagawa">神奈川県</option>
            <option value="niigata">新潟県</option>
            <option value="toyama">富山県</option>
            <option value="ishikawa">石川県</option>
            <option value="fukui">福井県</option>
            <option value="yamanashi">山梨県</option>
            <option value="nagano">長野県</option>
            <option value="shizuoka">静岡県</option>
            <option value="aichi">愛知県</option>
            <option value="mie">三重県</option>
            <option value="shiga">滋賀県</option>
            <option value="kyoto">京都府</option>
            <option value="osaka">大阪府</option>
            <option value="hyogo">兵庫県</option>
            <option value="nara">奈良県</option>
            <option value="wakayama">和歌山県</option>
            <option value="tottori">鳥取県</option>
            <option value="shimane">島根県</option>
            <option value="okayama">岡山県</option>
            <option value="hiroshima">広島県</option>
            <option value="yamaguchi">山口県</option>
            <option value="tokushima">徳島県</option>
            <option value="kagawa">香川県</option>
            <option value="ehime">愛媛県</option>
            <option value="kochi">高知県</option>
            <option value="fukuoka">福岡県</option>
            <option value="saga">佐賀県</option>
            <option value="nagasaki">長崎県</option>
            <option value="kumamoto">熊本県</option>
            <option value="oita">大分県</option>
            <option value="miyazaki">宮崎県</option>
            <option value="kagoshima">鹿児島県</option>
            <option value="okinawa">沖縄県</option>
          </optgroup>
        </select>
        <button id="btn-start-local" class="btn btn-primary" disabled>この県でスタート！</button>
      </div>
    </div>
  </div>

  <!-- 読み込み中画面 -->
  <div id="screen-loading" class="screen">
    <div class="loading-content">
      <div class="spinner"></div>
      <p class="loading-text">ストリートビューを探し中…</p>
    </div>
  </div>

  <!-- プレイ画面 -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="header-left">
        <span class="player-name-display" id="header-name"></span>
      </div>
      <div class="round-dots" id="round-dots"></div>
      <div class="header-right">
        <span class="score-badge">🏆 <span id="total-score">0</span>点</span>
        <button id="btn-fullscreen" class="btn-fullscreen" title="フルスクリーン">⛶</button>
      </div>
    </div>
    <div class="game-body">
      <!-- sv-wrapでstreetviewを包み、オーバーレイ・ボタンをstreetviewの外に出す -->
      <div class="sv-wrap">
        <div id="streetview"></div>
        <button id="btn-return-start" class="btn-return-start" title="スタート地点に戻る">🏠 スタートに戻る</button>
        <div id="sv-loading" class="sv-loading">
          <div class="sv-loading-spinner"></div>
          <p class="sv-loading-text">読み込み中...</p>
        </div>
      </div>
      <div class="map-panel">
        <div class="map-hint">📍 クリックして場所を当てよう！</div>
        <div id="answer-map"></div>
        <button id="btn-submit" class="btn btn-submit" disabled>ここだ！決定 ✓</button>
      </div>
    </div>
  </div>

  <!-- 1問結果画面 -->
  <div id="screen-result" class="screen">
    <div class="result-content">
      <div id="result-medal" class="result-medal"></div>
      <h2 id="result-distance" class="result-distance"></h2>
      <p id="result-score-msg" class="result-score-msg"></p>
      <p id="result-location-label" class="result-location-label" style="display:none"></p>
      <div id="result-map"></div>
      <button id="btn-next" class="btn btn-primary"></button>
    </div>
  </div>

  <!-- 最終結果画面 -->
  <div id="screen-final" class="screen">
    <div class="result-content">
      <h2 class="final-title">ゲーム終了！</h2>
      <div id="final-medal" class="result-medal"></div>
      <p class="final-score-label">最終スコア</p>
      <p id="final-score" class="final-score-value"></p>
      <p id="final-rank" class="final-rank"></p>
      <div id="gas-submit-area">
        <p class="ranking-msg">ランキングに登録しますか？</p>
        <div class="final-buttons">
          <button id="btn-submit-score" class="btn btn-primary">登録する！</button>
          <button id="btn-skip-score" class="btn btn-secondary">スキップ</button>
        </div>
      </div>
      <div id="gas-status" class="gas-status hidden"></div>
    </div>
  </div>

  <!-- ランキング画面 -->
  <div id="screen-ranking" class="screen">
    <div class="ranking-content">
      <h2 class="ranking-title">🏆 ランキング</h2>
      <div class="ranking-tabs">
        <button class="ranking-tab active" data-mode="nationwide">🗾 全国</button>
        <button class="ranking-tab" data-mode="local">📍 地元</button>
        <button class="ranking-tab" data-mode="world">🌍 世界</button>
      </div>
      <div id="ranking-list" class="ranking-list"></div>
      <div class="ranking-buttons">
        <button id="btn-retry" class="btn btn-primary">もう一度あそぶ！</button>
        <button id="btn-back-title" class="btn btn-secondary">タイトルへ</button>
      </div>
    </div>
  </div>

  <!-- game.js を先に読み込み window.initGame を定義してから Maps API を呼び出す -->
  <script src="game.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBsuF_hq1mWl0yQOFPBiiCwJ06oMwa1R1g&callback=initGame&loading=async"
    async defer></script>
</body>

</html>
